<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 저녁 뭐 먹지? | Dinner Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>오늘 저녁 뭐 먹지? 🍽️</h1>
      <p>결정하기 힘든 당신을 위한 최고의 선택!</p>
    </header>

    <main>
      <div id="result-card" class="result-card hidden">
        <span class="category" id="menu-category">카테고리</span>
        <h2 id="menu-name">메뉴 이름</h2>
        <div class="emoji" id="menu-emoji">🍲</div>
      </div>

      <button id="pick-btn" class="pick-btn">저녁 메뉴 추천받기!</button>
      
      <div class="history">
        <h3>최근 추천 기록</h3>
        <ul id="history-list"></ul>
      </div>

      <div class="contact-section">
        <h3>제휴 문의 🤝</h3>
        <form action="https://formspree.io/f/mbdaenlz" method="POST" id="contact-form">
          <div class="input-group">
            <input type="text" name="name" placeholder="성함 또는 업체명" required>
          </div>
          <div class="input-group">
            <input type="email" name="email" placeholder="이메일 주소" required>
          </div>
          <div class="input-group">
            <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
          </div>
          <button type="submit" class="submit-btn">문의하기</button>
        </form>
      </div>
    </main>
  </div>
  <script src="main.js"></script>
</body>
</html>
